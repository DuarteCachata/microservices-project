---
- name: Configure EC2 Instances
  hosts: web_servers
  become: yes

  vars:
    app_user: appuser
    app_directory: /opt/app

  tasks:

    - name: Create application user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash

    - name: Install required packages
      dnf:
        name:
          - git
          - java-21-amazon-corretto
          - maven
        state: present

    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Clone repository
      git:
        repo: https://github.com/spring-projects/spring-petclinic.git
        dest: "{{ app_directory }}/spring-petclinic"
      become_user: "{{ app_user }}"

    - name: Create target directory
      file:
        path: "{{ app_directory }}/spring-petclinic/target"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Build application
      command: mvn clean package -DskipTests -Dcheckstyle.skip
      args:
        chdir: "{{ app_directory }}/spring-petclinic"
      become_user: "{{ app_user }}"

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/petclinic.service
        content: |
          [Unit]
          Description=Spring Petclinic
          After=network.target

          [Service]
          User=appuser
          WorkingDirectory=/opt/app/spring-petclinic
          ExecStart=/usr/bin/java -jar /opt/app/spring-petclinic/target/*.jar
          SuccessExitStatus=143

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start service
      systemd:
        name: petclinic
        enabled: yes
        state: started